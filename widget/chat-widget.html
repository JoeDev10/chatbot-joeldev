<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - JoelDev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Floating button ── */
    #chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #6c63ff;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(108,99,255,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s;
      z-index: 1000;
    }
    #chat-toggle:hover { transform: scale(1.08); }

    /* ── Chat window ── */
    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 360px;
      max-height: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transition: opacity .25s, transform .25s;
    }
    #chat-window.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
    }

    /* header */
    .chat-header {
      background: #6c63ff;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header .info { flex: 1; }
    .chat-header .info .name { font-weight: 600; font-size: 15px; }
    .chat-header .info .status { font-size: 12px; opacity: .85; }

    /* messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
    }
    .bubble.bot {
      background: #f0f2f5;
      color: #1c1c1e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: #6c63ff;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.typing { opacity: .65; font-style: italic; }

    /* input area */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #e9ecef;
    }
    .chat-input textarea {
      flex: 1;
      border: 1px solid #dee2e6;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 100px;
      font-family: inherit;
    }
    .chat-input textarea:focus { border-color: #6c63ff; }
    .chat-input button {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #6c63ff;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .2s;
    }
    .chat-input button:disabled { background: #c0bdf7; cursor: default; }

    @media (max-width: 400px) {
      #chat-window { width: calc(100vw - 24px); right: 12px; bottom: 90px; }
    }
  </style>
</head>
<body>

<!-- Floating button -->
<button id="chat-toggle" title="Chatear con nosotros">💬</button>

<!-- Chat window -->
<div id="chat-window" class="hidden">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name">JoelDev Asistente</div>
      <div class="status">¿En qué te puedo ayudar?</div>
    </div>
  </div>

  <div id="messages"></div>

  <div class="chat-input">
    <textarea id="input" rows="1" placeholder="Escribí tu consulta..." maxlength="500"></textarea>
    <button id="send-btn" title="Enviar">➤</button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const API_URL = "http://localhost:8000/chat";
  // ────────────────────────────────────────────────────────

  const toggle   = document.getElementById("chat-toggle");
  const window_  = document.getElementById("chat-window");
  const messages = document.getElementById("messages");
  const input    = document.getElementById("input");
  const sendBtn  = document.getElementById("send-btn");

  let history    = [];
  let isOpen     = false;
  let isStreaming = false;

  toggle.addEventListener("click", () => {
    isOpen = !isOpen;
    window_.classList.toggle("hidden", !isOpen);
    toggle.textContent = isOpen ? "✕" : "💬";
    if (isOpen && history.length === 0) addBubble("bot", "¡Hola! 👋 Soy el asistente de JoelDev. Puedo ayudarte con info sobre los servicios de creación de páginas web. ¿Qué necesitás saber?");
  });

  function addBubble(role, text, typing = false) {
    const el = document.createElement("div");
    el.className = `bubble ${role}${typing ? " typing" : ""}`;
    el.textContent = text;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = "";
    input.style.height = "auto";
    addBubble("user", text);
    history.push({ role: "user", content: text });

    isStreaming = true;
    sendBtn.disabled = true;

    const botBubble = addBubble("bot", "Escribiendo...", true);
    let accumulated = "";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error("Error del servidor");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      botBubble.classList.remove("typing");
      botBubble.textContent = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        accumulated += chunk;
        botBubble.textContent = accumulated;
        messages.scrollTop = messages.scrollHeight;
      }

      history.push({ role: "assistant", content: accumulated });

    } catch (err) {
      botBubble.textContent = "Hubo un error al conectar con el servidor. Por favor intentá de nuevo.";
      history.pop();
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });
</script>
</body>
</html>
